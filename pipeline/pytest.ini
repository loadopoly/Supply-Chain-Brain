[pytest]
# Supply Chain Brain — pytest configuration
# Run from pipeline/: .venv\Scripts\pytest tests\ -v
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: pure-Python unit tests, no DB, no network
    integration: needs local SQLite (findings_index.db / local_brain.sqlite)
    slow: longer-running tests (>2 s each)
    quest: Brain Quest engine tests
    bench: benchmark / perf tests
