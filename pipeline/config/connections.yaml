azure_sql:
  server: edap-replica-cms-sqlserver.database.windows.net
  database: edap-replica-cms-sqldb
  user: agard@astecindustries.com
  # ActiveDirectoryInteractive triggers Entra MFA browser popup on first connect
  authentication: ActiveDirectoryInteractive
  driver: "ODBC Driver 18 for SQL Server"
  encrypt: "yes"
  trust_server_certificate: "no"
  connection_timeout: 30
  query_timeout: 120  # seconds; 0 = no limit; PFEP multi-CTE queries can take 60-90 s on large sites

# ---------------------------------------------------------------------------
# Epicor 9 sites (SQL Server backend — domain Kerberos preferred)
# Set server + database here OR via env vars EPICOR_<SITE>_SERVER / _DATABASE.
# Store SQL credentials once with:
#   python -m src.connections.secrets set epicor_jerome_ave --user <upn> --password <pw>
# ---------------------------------------------------------------------------
epicor_jerome_ave:
  server:   ""   # override: EPICOR_JEROME_AVE_SERVER
  database: ""   # override: EPICOR_JEROME_AVE_DATABASE
  authentication: ActiveDirectoryIntegrated
  driver: "ODBC Driver 18 for SQL Server"
  encrypt: "yes"
  trust_server_certificate: "yes"
  connection_timeout: 30
  site_string: "Chattanooga - Jerome Avenue"

