  # Periodic internet scout — brain.llm_scout
  scout:
    enabled: true
    interval_hours: 168            # weekly sweep
    sources:
      - kind: huggingface
        url:  https://huggingface.co/api/models
        query: { filter: 'text-generation', sort: 'likes7d', direction: -1, limit: 50 }
      - kind: openrouter
        url:  https://openrouter.ai/api/v1/models
      - kind: lmarena
        url:  https://lmarena.ai/api/leaderboard
      - kind: artificial_analysis
        url:  https://artificialanalysis.ai/api/v2/data/llms/models
    accept_rules:
      open_weights_only:    true
      free_tier_only:       true        # cost_per_mtok_* must be 0
      require_free_suffix:  true        # OpenRouter ids must end in ':free'
      min_likes_7d:         250
      min_arena_elo:        1180
      min_release_date:     2025-10-01
      exclude_licenses:     ['proprietary', 'noncommercial', 'research-only']
      vendor_blocklist:     ['openai', 'anthropic', 'amazon', 'inflection',
