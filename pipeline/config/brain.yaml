# Supply Chain Brain — declarative configuration
# Every page reads from this. Override / extend by editing here, not in code.

# ---------------------------------------------------------------------------
# Schema hints — patterns used by brain.schema_introspect to find columns
# ---------------------------------------------------------------------------
column_patterns:
  part_id:        ['part_key', 'part_number', 'item_number', 'item_id', 'PartNum', 'item']
  part_desc:      ['part_description', 'description', 'item_desc', 'PartDescription']
  supplier_id:    ['supplier_key', 'supplier_number', 'vendor_id', 'vendor_number', 'VendorNum', 'vendor_num']
  supplier_name:  ['supplier_name', 'vendor_name', 'pre_standardization_supplier_name', 'Name']
  site:           ['site', 'plant', 'facility', 'org_id', 'inv_org', 'business_unit_key', 'Plant', 'whse']
  on_hand_qty:    ['quantity_on_hand', 'on_hand_qty', 'on_hand', 'qoh', 'OnhandQty', 'qty_on_hand']
  open_order_qty: ['quantity_not_received', 'demand_order_part_quantity', 'open_qty',
                   'open_order_qty', 'on_order_qty', 'OpenRelQty']
  demand_qty:     ['shipped_quantity', 'sales_order_quantity', 'demand_order_part_quantity',
                   'demand_qty', 'usage_qty', 'consumption', 'shipped_qty', 'sales_qty',
                   'ShipQty', 'qty_shipped']
  lead_time_days: ['lead_time', 'lead_time_days', 'planning_lead_time', 'po_lead_time',
                   'order_lead_time', 'LeadTime']
  unit_cost:      ['unit_cost', 'standard_cost', 'avg_cost', 'item_cost', 'unit_cost_local',
                   'unit_cost_usd', 'unit_price', 'UnitCost', 'OurUnitCost']
  promise_date:   ['due_date_key', 'need_by_date', 'promise_date', 'requested_date',
                   'NeedByDate', 'due_date']
  receipt_date:   ['receipt_date_key', 'receipt_date', 'received_date', 'actual_receipt_date',
                   'ReceivedDate', 'rcpt_date']
  order_date:     ['order_date_key', 'order_date', 'po_date', 'creation_date', 'OrderDate']
  frozen_qty:     ['frozen_qty', 'TotFrozenQOH', 'FrozenOnHand', 'qty_on_hand_before']
  count_qty:      ['count_qty', 'TotCountQOH', 'CountedQty', 'qty_counted']
  discrepancy_reason: ['discrepancy_reason', 'CDRCode', 'DiscrepancyReasonCode', 'reason_code']
  abc_class:      ['abc_class', 'ABCCode', 'ABC_Class', 'item_abc_code', 'ClassID', 'abc_code']
  cycle_date:     ['cycle_date_key', 'CycleDate', 'CountDueDate', 'due_date']
  complete_date:  ['count_date_key', 'CompleteDate', 'CountCompletedDate', 'post_date']
  warehouse:      ['warehouse_code', 'WareHouseCode', 'SubInventoryCode', 'whse']
  safety_stock:   ['safety_stock', 'SafetyQty', 'reorder_point']
  make_or_buy:    ['make_or_buy', 'fabricated_purchased', 'TypeCode', 'make_buy', 'Part Pur/Fab']

