# ---------------------------------------------------------------------------
# EOQ defaults (per-part overrides land in findings_index over time)
# ---------------------------------------------------------------------------
eoq:
  ordering_cost_default: 75.0      # $ per PO line (override per supplier later)
  holding_rate_default:  0.22      # fraction of unit cost / year
  bayes_prior_alpha:     2.0       # Gamma(alpha, beta) prior on Poisson rate
  bayes_prior_beta:      1.0       # high beta = strong shrinkage toward prior mean
  deviation_top_n:       250       # rows shown by default in EOQ Deviation page

# ---------------------------------------------------------------------------
# OTD recursive clustering defaults (Phase-1 port of attached script)
# ---------------------------------------------------------------------------
otd:
  source_table:          'edap_dw_replica.fact_po_receipt'
  description_col_hint:  'description'
  site_col_hint:         'site'
  numeric_col_hints:     ['days_late', 'days_early', 'received_qty', 'unit_price']
  categorical_col_hints: ['supplier_name', 'buyer', 'commodity']
  max_depth:             4
  max_k:                 8
  random_state:          42

# ---------------------------------------------------------------------------
# External applications — modular pluggable apps (req 5)
# ---------------------------------------------------------------------------
external_apps:
  ips_freight:
    enabled:   true
    base_url:  'https://ips-freight-api.onrender.com'
    dashboard: 'https://ips-freight-api.onrender.com/dashboard'
    auth_env:  'IPS_FREIGHT_TOKEN'        # bearer token from env var
    timeout_s: 20

# ---------------------------------------------------------------------------
# Graph backend (Phase 2). Default networkx; switch to neo4j or cosmos for prod
# ---------------------------------------------------------------------------
graph:
  backend: networkx
  neo4j:
    uri:           bolt://localhost:7687
    user:          neo4j
    password_env:  NEO4J_PASSWORD
    database:      neo4j
  cosmos_gremlin:
    endpoint: 'wss://YOUR-ACCOUNT.gremlin.cosmos.azure.com:443/'
    database: scbrain
    graph:    scbrain
    key_env:  COSMOS_GREMLIN_KEY

# ---------------------------------------------------------------------------
# Emissions (Phase 3.6) — GLEC g CO2e per tonne-km. Override per local data.
# ---------------------------------------------------------------------------
emissions:
  factors:
    truck_ftl: 62.0
    truck_ltl: 103.0
    rail:      22.0
    ocean:     8.0
    air:       602.0
    intermodal: 35.0
    barge:     30.0

# ---------------------------------------------------------------------------
# Cross-app event bus (Phase 4) — outbound HMAC-signed webhooks
# ---------------------------------------------------------------------------
cross_app:
  subscribers:
    - name:       ips_freight
      url:        'https://ips-freight-api.onrender.com/webhooks/scbrain'
      secret_env: SCBRAIN_WEBHOOK_SECRET
      events:     ['ghost_lane_flagged', 'eoq_deviation_resolved']

# ---------------------------------------------------------------------------
# Multi-echelon defaults
# ---------------------------------------------------------------------------
multi_echelon:
  default_service_level: 0.95
  holding_rate:          0.22

