  # Task profiles map each Brain stage / job to capability weights + budget.
  # brain.llm_router.select_llm(task) computes score = Σ wᵢ · capᵢ
  #   − λ_cost · norm_cost − λ_latency · norm_latency
  # with hard filters (min_ctx, must_be_open, max_latency_ms) applied first.
  task_profiles:
    vendor_consolidation:           # PRC: LLM-driven supplier/product matching
      weights: { reasoning: 0.25, structured: 0.30, multilingual: 0.20, long_ctx: 0.15, coding: 0.10 }
      min_ctx: 64000
      lambda_cost: 0.15
      lambda_latency: 0.05
