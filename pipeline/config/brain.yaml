    audit_log: 'pipeline/docs/LLM_SCOUT_AUDIT.md'

  # -------------------------------------------------------------------------
  # Candidate Trial System — new models enter here for a scored probationary
  # period before being promoted into llms.registry via llm_registry.sqlite.
  # brain.llm_candidate fires each candidate alongside the main ensemble (but
  # excludes their responses from the authoritative answer). After
  # `dispatches_required` observations the candidate is auto-promoted
  # (ema_success >= promote_threshold) or auto-rejected.
  # Promoted models are written to the llm_registry SQLite table so
  # brain.llm_router.available_models() picks them up immediately.
  # scout.accept_rules do NOT apply here; candidates are added manually.
  # -------------------------------------------------------------------------
  candidates:
    trial:
      dispatches_required: 50        # minimum dispatches before a decision
      ema_alpha:           0.10      # EMA decay factor (matches ensemble learning.ema_alpha)
      promote_threshold:   0.72      # ema_success >= this → promoted to llm_registry
      reject_threshold:    0.45      # ema_success <= this after N dispatches → rejected
    models:
      - id: deepseek-v4-pro
        vendor: deepseek
        tier: paid
        params_b: 1600
        active_b: 49
        moe: true
        ctx_window: 1048576
        license: proprietary
        released: 2026-04-23
        endpoint_env: DEEPSEEK_V4_PRO_ENDPOINT
        capabilities:
          reasoning:    0.97
          coding:       0.98
          long_ctx:     0.97
          math:         0.97
          multilingual: 0.87
          structured:   0.95
          vision:       0.45
        cost_per_mtok_in:  1.74
        cost_per_mtok_out: 3.48
        median_latency_ms: 4000
      - id: deepseek-v4-flash
        vendor: deepseek
        tier: paid
        params_b: 284
        active_b: 13
        moe: true
        ctx_window: 1048576
        license: proprietary
        released: 2026-04-23
        endpoint_env: DEEPSEEK_V4_FLASH_ENDPOINT
        capabilities:
          reasoning:    0.87
          coding:       0.88
          long_ctx:     0.97
          math:         0.86
          multilingual: 0.82
          structured:   0.88
          vision:       0.40
        cost_per_mtok_in:  0.14
        cost_per_mtok_out: 0.28
        median_latency_ms: 800

  # -------------------------------------------------------------------------
  # Multi-LLM Ensemble (parallel dispatch + learnable weights & biases).
  # The Brain treats every task answer as a weighted combination of K free
  # models running concurrently. Per-(model,task) weights & biases are stored
  # in local_brain.sqlite.llm_weights and updated online by the dispatcher
  # using validator-signal SGD (see brain.llm_ensemble.update_weights).
  # -------------------------------------------------------------------------
  ensemble:
    enabled:           true
    parallel_workers:  7              # one slot per seed model; scales with K
    fanout_k:          5              # how many top-ranked models run in parallel
    request_timeout_s: 45
    aggregator_default: weighted_softmax_vote   # flip to recurrent_depth_vote to enable RDT globally
    aggregators:
      # ---------------------------------------------------------------------
      # Recurrent Depth Transformer aggregator (Geiping et al. 2025 idea
      # adapted to the discrete vote-distribution simplex). Runs a weight-
      # tied recurrent block over the K contributors with adaptive halting.
      # Flip aggregator_default above to "recurrent_depth_vote" to use
      # globally; otherwise tasks can opt in via task_profiles.<task>.aggregator.
      # ---------------------------------------------------------------------
      recurrent_depth_vote:
        enabled:           true
        max_depth:         8        # hard cap on recurrent iterations
        min_depth:         1        # always run at least this many steps
        kl_epsilon:        0.001    # halt when KL(p_t+1 || p_t) drops below this
        temp_attention:    0.5      # attention softmax temperature over contributors
        temp_state_start:  1.0      # state-sharpening temp at depth 1
        temp_state_end:    0.35     # state-sharpening temp at max_depth (annealed)
        residual_alpha:    0.6      # blend factor: p_{t+1} = (1-a)*p_t + a*q
        agreement_lambda:  1.5      # boost contributors that agree with current belief
    learning:
      lr_weight:       0.05           # gradient step on per-model weight
      lr_bias:         0.02           # gradient step on per-model bias
      l2_reg:          0.001          # weight decay to prevent runaway dominance
      success_target:  1.0            # validator score the ensemble aims for
      ema_alpha:       0.2            # exponential moving avg for latency/success
      min_weight:      0.05           # floor so no model is permanently silenced
      max_weight:      3.00
    initial_weights:                  # priors per (task, model_id); router score
                                      # is used as the bootstrap when missing.
      default: 1.0
  # -------------------------------------------------------------------------
  # Shared Compute Grid — domain-attached workstations contribute CPU/GPU
  # using the EXISTING piggyback infrastructure:
  #   * Peer activation:   drops `compute_*.trigger` into `pipeline/bridge_triggers/`
  #                        which the OneDrive-synced bridge_watcher.ps1 picks up
  #                        on every peer (same mechanism as the RDP/SQL bridge).
  #   * Peer rendezvous:   each peer publishes capacity to
  #                        `pipeline/bridge_state/compute_peers/<host>.json`
  #                        (OneDrive sync = zero new transport).
  #   * Job channel:       raw TCP on port 8000 (already reserved as "LLM/API"
  #                        in bridge_watcher.ps1) — same wire format as
  #                        agent_uplink.py (header line + 8-byte size + bytes).
  # If no peer is reachable / available, the dispatcher falls back to the
  # device running the Brain.
  # -------------------------------------------------------------------------
  compute_grid:
    enabled:           true
    listen_port:       8000              # already mapped by bridge_watcher.ps1
    connect_timeout_s: 1.0               # fast TCP probe before submitting
    request_timeout_s: 8.0               # full job round-trip cap
    down_cooldown_s:   30.0              # negative-cache for unreachable peers
    rendezvous:
      trigger_dir:     'pipeline/bridge_triggers'   # piggyback trigger drop
      state_dir:       'pipeline/bridge_state/compute_peers'  # peer heartbeats
      heartbeat_secs:  30
      stale_after_s:   120                # ignore peers that stop heartbeating
    discovery:
      methods:         [piggyback, ad, seed]
      ad_filter:       'OperatingSystem -like "Windows*"'
      ad_max_hosts:    64
      seeds:           ['192.168.0.183']  # CRP-FS03 — local wireless PC (symbiotic peer)
      probe_timeout_s: 1.5
      cache_ttl_s:     300
    selection:
      prefer_gpu:      true
      max_cpu_load:    0.80
      min_free_ram_gb: 4
      min_free_vram_gb: 2
    fallback:
      always_include_local:  true
      local_only_if_no_peers: false
    auth:
      shared_secret_env: SCBRAIN_GRID_SECRET     # HMAC on every request
    worker_max_per_peer: 2

  # -------------------------------------------------------------------------
  # Bounded self-training: feed the data pipeline back into the ensemble
  # weights, but with explicit guard rails so the Brain doesn't lose
  # fluidity for multi-echeloned reasoning or dynamic interpretations.
  #
  #   * Only WHITELISTED tasks receive pipeline-grounded updates.
  #     Generative / reasoning / what-if tasks keep router-prior dynamics.
  #   * `lr_scale`        scales the live learning rate down (0.5 = half).
  #   * `drift_cap`       caps how far a single round can move a weight.
  #   * `min_weight_floor` ensures no model is ever fully suppressed.
  #   * `max_share_per_task` keeps any single model from monopolizing a task.
  #   * `exploration_reserve` % of dispatches that bypass learned weights
  #     entirely and use the pure router prior — this preserves fluidity
  #     and keeps newcomers / underdogs reachable.
  # -------------------------------------------------------------------------
  self_train:
    enabled:               true
    interval_s:            1800       # 30 min when run from background scheduler
    limit_per_task:        200        # max dispatches replayed per round
    lr_scale:              0.5        # half the live learning rate
    drift_cap:             0.5        # max |Δweight| per round
    min_weight_floor:      0.10       # nothing ever decays below this
    max_share_per_task:    0.50       # cap any single model's share of weight mass
    dampen_factor:         0.85       # how hard to dampen monopolists
    exploration_reserve:   0.15       # 15% of dispatches use pure router prior
    tasks:
      # Whitelist with explicit ground-truth source. Only tasks listed here
      # ever receive pipeline-driven weight updates.
      vendor_consolidation:
        table:        part_category
        key_column:   part_id
        value_column: category
      otd_classify:
        table:        otd_ownership
        key_column:   row_key
        value_column: owner
      # Epicor cycle-count discrepancy reason classification
      # Ground truth: reason_code in stg_replica.epicor_cc_* staging tables.
      # Only fires after epicor CC data has been staged (post-extract round).
      cc_reason_classify:
        table:        epicor_cc_jerome_ave
        key_column:   part_number
        value_column: discrepancy_reason
      # SyteLine cycle-count — Parsons site (PFI_App.dbo.cc_trn per spec §3.2)
      cc_reason_classify_syteline:
        table:        syteline_cc_parsons
        key_column:   part_number
        value_column: discrepancy_reason
      # ABC class inference — validate LLM ABC assignments against staged item master
      abc_classify:
        table:        epicor_dim_part
        key_column:   part_number
        value_column: abc_class

  # -------------------------------------------------------------------------
  # Network expansion learner: the Brain learns from every connection it
  # already touches across all protocols (DB, SMB, SMTP/MX, HTTPS, peer
  # compute grid, OneDrive bridge_state, declared external apps and webhook
  # subscribers, operator seeds). Probes are PASSIVE — a TCP connect (or DNS
  # resolve when no port is known). No credentials are sent. Observations
  # adjust *routing telemetry* and the compute-grid seed pool only — they
  # never touch llm_weights, router scores, or ensemble dispatch math, so
  # multi-echeloned reasoning fluidity is preserved.
  # -------------------------------------------------------------------------
  network_learn:
    enabled:                       true
    interval_s:                    600        # 10 min when run from background scheduler
    probe_timeout_s:               1.5
    min_seconds_between_rounds:    30.0
    max_probes_per_round:          64
    ema_alpha:                     0.30       # smoothing for success-rate / latency
    mx_lookup:                     true
    corporate_domain:              astecindustries.com
    auto_promote_compute:          true       # add verified peers to grid seed list
    compute_promotion_min_success: 0.70       # EMA success threshold for promotion
    active_probe:                  false      # opt-in for active CIDR scanning
    seeds: []                                  # operator-supplied seeds (host or {host,protocol,port})

  # -------------------------------------------------------------------------
  # Knowledge corpus & recent-learnings log. Consolidates every signal the
  # Brain produces (self-train rounds, ensemble dispatches, weight snapshots,
  # network probes, peer promotions, NLP part categories, OTD ownership)
  # into:
  #   * `learning_log`  — append-only stream of "things the Brain just learned"
  #   * `corpus_entity` — normalized catalog of Parts, Suppliers, Sites,
  #                       Models, Peers, Protocols, Tasks, Categories,
  #                       Owners, POs, Endpoints
  #   * `corpus_edge`   — typed relationships (CLASSIFIED_AS, ANSWERS,
  #                       WEIGHTED_FOR, USES, OWNS, ...) with EMA-smoothed
  #                       weight & sample count
  # Then `materialize_into_graph()` projects everything into the configured
  # graph backend (NetworkX default, Neo4j or Cosmos Gremlin in prod) so
  # every page that already speaks `get_graph_backend()` benefits.
  # -------------------------------------------------------------------------
  knowledge_corpus:
    enabled:                       true
    interval_s:                    900       # 15 min when run from background scheduler
    min_seconds_between_rounds:    60.0
    max_entities_to_project:       5000
    max_edges_to_project:          20000

  # -------------------------------------------------------------------------
  # Brain → Body bridge. The User is the Body of the Brain — every signal
  # the Brain produces (self-train rounds, ensemble validators, network
  # observations, peer promotions, knowledge-corpus topology) is distilled
  # into a prioritized, executable Directive aimed at a specific role
  # (Buyer, Planner, Quality, IT, Ops). The User's feedback (ack /
  # in_progress / done / rejected + free-text outcome) is recorded to
  # `body_feedback` and is itself ingested by knowledge_corpus on the next
  # round, closing the loop.
  # -------------------------------------------------------------------------
  brain_body:
    enabled:                       true
    interval_s:                    600       # 10 min when run from background scheduler
    min_seconds_between_rounds:    30.0
    max_directives_per_round:      25
